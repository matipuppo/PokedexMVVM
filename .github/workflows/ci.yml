name: CI

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore PokeDexMVVM.Tests/PokeDexMVVM.Tests.csproj

      - name: Build
        run: dotnet build PokeDexMVVM.Tests/PokeDexMVVM.Tests.csproj --no-restore

      - name: Test
        run: dotnet test PokeDexMVVM.Tests/PokeDexMVVM.Tests.csproj --no-build